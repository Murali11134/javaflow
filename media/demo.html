<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaFlow Mindmap — Demo</title>

  <!-- Local bundles (same files served by the VS Code webview) -->
  <script src="d3.min.js"></script>
  <script src="markmap-view.js"></script>
  <script src="markmap-lib.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #toolbar h2 {
      font-size: 13px;
      font-weight: 600;
      color: #89b4fa;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn {
      padding: 4px 10px;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #45475a; }

    /* ── Legend ── */
    #legend {
      display: flex;
      gap: 12px;
      padding: 4px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
      font-size: 11px;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; color: #a6adc8; }

    /* ── Mindmap container ── */
    #mindmap-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #mindmap-container svg { width: 100%; height: 100%; }

    /* ── Loading ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e1e2e;
      z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #313244;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #89b4fa; font-size: 13px; }

    /* ── Search overlay ── */
    #search-bar {
      display: none;
      position: absolute;
      top: 10px; right: 10px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 6px 10px;
      z-index: 20;
      gap: 6px;
      align-items: center;
    }
    #search-bar.visible { display: flex; }
    #search-input {
      background: transparent;
      border: none;
      outline: none;
      color: #cdd6f4;
      font-size: 13px;
      width: 200px;
    }
    #search-count { color: #a6adc8; font-size: 11px; }
  </style>
</head>
<body>

<div id="toolbar">
  <h2>☕ com.example — JavaFlow Demo</h2>
  <button class="btn" id="btn-expand-all">Expand All</button>
  <button class="btn" id="btn-collapse-all">Collapse All</button>
  <button class="btn" id="btn-fit">⊞ Fit</button>
  <button class="btn" id="btn-search">🔍 Search</button>
  <button class="btn" id="btn-export">↓ SVG</button>
</div>

<div id="legend">
  <span class="legend-item">🏛 Class</span>
  <span class="legend-item">📐 Interface</span>
  <span class="legend-item">🔢 Enum</span>
  <span class="legend-item">📝 Annotation</span>
  <span class="legend-item">🔓 Public</span>
  <span class="legend-item">🔒 Private/Protected</span>
</div>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="Search nodes…" />
  <span id="search-count"></span>
  <button class="btn" id="btn-search-close">✕</button>
</div>

<div id="mindmap-container">
  <div id="loading">
    <div class="spinner"></div>
    <p>Generating mindmap…</p>
  </div>
  <svg id="mindmap"></svg>
</div>

<script>
const markdown = `
# ☕ com.example

## 🏛 UserService
- Extends: BaseService
- Implements: UserRepository, Serializable
- @Service @Transactional
### 🔓 Constructors
- public UserService(String host, int port)
### 📦 Fields
- 🔒 private String host
- 🔒 private int port
- 🔒 private final UserDao dao
### 🔓 Public Methods
- User findById(Long id) → calls: dao.findById, validate
- List findAll() → calls: dao.findAll
- User save(User user) → calls: validate, dao.save, notifyListeners
- void deleteById(Long id) → calls: dao.delete
### 🔒 Private Methods
- void validate(User user)
- void notifyListeners(User user)
### 🏛 Nested: Builder
- 🔒 private String host
- 🔒 private int port
- public Builder host(String h)
- public Builder port(int p)
- public UserService build()

## 📐 UserRepository
- @Repository
### Methods
- User findById(Long id)
- List findAll()
- User save(User user)
- void deleteById(Long id)

## 🔢 UserStatus
### Constants
- ACTIVE
- INACTIVE
- SUSPENDED
- DELETED
### Methods
- boolean isActive()

## 📝 Auditable
### Elements
- String createdBy()
- String modifiedBy()
- AuditPolicy policy()

## 🏛 EmailValidator
- Implements: Validator
- @Component
### 🔓 Public Methods
- boolean validate(String email)
- boolean validateDomain(String domain)
### 🔒 Private Methods
- boolean checkMx(String domain)
`.trim();

(async () => {
  await new Promise(r => {
    if (window.markmap) { r(); return; }
    const check = setInterval(() => {
      if (window.markmap) { clearInterval(check); r(); }
    }, 50);
    setTimeout(() => { clearInterval(check); r(); }, 5000);
  });

  const { Markmap, loadCSS, loadJS } = window.markmap;
  const { Transformer } = window.markmap;

  const transformer = new Transformer();
  const { root, features } = transformer.transform(markdown);
  const { styles, scripts } = transformer.getUsedAssets(features);

  if (styles) { loadCSS(styles); }
  // only load scripts if present (none expected for plain markdown)
  if (scripts && scripts.length) {
    await loadJS(scripts, { getMarkmap: () => window.markmap });
  }

  const svgEl = document.getElementById('mindmap');
  const mm = Markmap.create(svgEl, {
    zoom: true,
    pan: true,
    spacingHorizontal: 60,
    spacingVertical: 5,
    autoFit: true,
    initialExpandLevel: 2,
    color: (node) => {
      const palette = ['#89b4fa','#a6e3a1','#fab387','#f5c2e7','#94e2d5','#cba6f7','#f38ba8'];
      return palette[(node.depth || 0) % palette.length];
    }
  }, root);

  document.getElementById('loading').style.display = 'none';

  document.getElementById('btn-fit').addEventListener('click', () => mm.fit());

  document.getElementById('btn-expand-all').addEventListener('click', () => {
    mm.setData(root);
    setTimeout(() => mm.fit(), 50);
  });

  document.getElementById('btn-collapse-all').addEventListener('click', () => {
    function collapse(node) {
      if (node.children) {
        node.payload = { ...node.payload, fold: 1 };
        node.children.forEach(collapse);
      }
    }
    const collapsed = JSON.parse(JSON.stringify(root));
    if (collapsed.children) { collapsed.children.forEach(collapse); }
    mm.setData(collapsed);
  });

  document.getElementById('btn-export').addEventListener('click', () => {
    const svg = document.getElementById('mindmap');
    const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'javaflow-mindmap.svg'; a.click();
    URL.revokeObjectURL(url);
  });

  const searchBar   = document.getElementById('search-bar');
  const searchInput = document.getElementById('search-input');
  const searchCount = document.getElementById('search-count');

  document.getElementById('btn-search').addEventListener('click', () => {
    searchBar.classList.toggle('visible');
    if (searchBar.classList.contains('visible')) { searchInput.focus(); }
  });
  document.getElementById('btn-search-close').addEventListener('click', () => {
    searchBar.classList.remove('visible');
    searchInput.value = '';
    searchCount.textContent = '';
  });
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchCount.textContent = ''; return; }
    let count = 0;
    function walk(node) {
      if ((node.content || '').toLowerCase().includes(q)) { count++; }
      if (node.children) { node.children.forEach(walk); }
    }
    walk(root);
    searchCount.textContent = count ? `${count} match${count > 1 ? 'es' : ''}` : 'No matches';
  });
})();
</script>
</body>
</html>
